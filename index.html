<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LessonLog</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LessonLog">
<meta name="theme-color" content="#1A1A1A">
<link rel="manifest" id="manifestLink" href="#">
<link rel="apple-touch-icon" id="appleTouchIcon" href="#">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F7F5F0;--surface:#fff;--ink:#1A1A1A;--mid:#666;--faint:#BBB;--rule:#E8E4DC;
  --green:#2D5A3D;--green-light:#EAF2EC;--warn:#C4622D;--warn-light:#FDF0E8;
  --dot-done:#2D5A3D;--dot-next:#AAA;--dot-empty:#E0DDD8;
}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}

/* pages */
.page{display:none;min-height:100vh}
.page.active{display:block}

/* header */
header{
  background:var(--surface);border-bottom:1px solid var(--rule);
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.5rem;
  padding-top:calc(env(safe-area-inset-top) + 1rem);
  position:sticky;top:0;z-index:20
}
.logo{font-family:'Instrument Serif',serif;font-size:1.35rem;letter-spacing:-.02em;cursor:pointer}
.logo em{font-style:italic;color:var(--green)}
.date-lbl{font-size:.6rem;color:var(--mid);letter-spacing:.08em;text-transform:uppercase}

/* buttons */
.btn{border:none;border-radius:8px;font-family:'DM Mono',monospace;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.75}
.btn-dark{background:var(--ink);color:#fff;padding:9px 18px;font-size:.72rem;letter-spacing:.04em}
.btn-ghost{background:none;color:var(--mid);font-size:.72rem;letter-spacing:.03em;padding:0}
.btn-ghost:hover{color:var(--ink);opacity:1}
.btn-link{background:none;border:none;font-family:'DM Mono',monospace;font-size:.66rem;color:var(--mid);cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.btn-link:hover{color:var(--ink)}
.btn-link-warn{background:none;border:none;font-family:'DM Mono',monospace;font-size:.66rem;color:var(--warn);cursor:pointer;text-decoration:underline;text-underline-offset:3px}

/* main */
main{padding:1.4rem 1.5rem;max-width:600px}

/* today strip */
.today-strip{background:var(--ink);color:#fff;border-radius:12px;padding:1rem 1.2rem;margin-bottom:1.4rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.today-strip.empty{opacity:.4;justify-content:center}
.today-name{font-family:'Instrument Serif',serif;font-size:1.1rem;margin-bottom:2px}
.today-meta{font-size:.62rem;opacity:.55;letter-spacing:.04em}
.btn-done{background:#fff;color:var(--ink);border:none;border-radius:7px;padding:9px 18px;font-family:'DM Mono',monospace;font-size:.7rem;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.btn-done:hover{background:var(--green-light);color:var(--green)}

/* section label */
.lbl{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:.75rem}

/* student cards */
.students-list{display:flex;flex-direction:column;gap:.4rem}
.s-card{background:var(--surface);border:1px solid var(--rule);border-radius:12px;padding:.95rem 1.1rem;cursor:pointer;display:flex;align-items:center;gap:.9rem;transition:all .15s}
.s-card:hover{border-color:#C8C4BC;box-shadow:0 2px 10px rgba(0,0,0,.06);transform:translateY(-1px)}
.s-card.warn{border-color:var(--warn);background:var(--warn-light)}
.s-card-left{flex:1;min-width:0}
.s-name{font-family:'Instrument Serif',serif;font-size:1.05rem;margin-bottom:.4rem}
.dots{display:flex;gap:4px;margin-bottom:.3rem}
.dot{width:8px;height:8px;border-radius:50%}
.dot.done{background:var(--dot-done)}
.dot.next{background:var(--dot-next)}
.dot.empty{background:var(--dot-empty)}
.s-sub{font-size:.62rem;color:var(--mid)}
.s-sub.warn-txt{color:var(--warn);font-weight:500}
.s-card-right{text-align:right;flex-shrink:0}
.nl-lbl{font-size:.55rem;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.nl-date{font-size:.76rem;font-weight:500}
.nl-date.today{color:var(--green)}
.nl-date.soon{color:var(--warn)}
.nl-time{font-size:.63rem;color:var(--mid);margin-top:1px}
.chevron{font-size:.68rem;color:var(--faint)}

/* empty state */
.empty-state{text-align:center;padding:3.5rem 1rem;color:var(--faint)}
.empty-state p{font-size:.78rem;line-height:1.8;margin-bottom:1.2rem}

/* detail page */
.detail-hdr{padding:1.2rem 1.5rem;border-bottom:1px solid var(--rule);display:flex;align-items:flex-start;justify-content:space-between}
.d-name{font-family:'Instrument Serif',serif;font-size:1.7rem;margin-bottom:.2rem}
.d-sub{font-size:.64rem;color:var(--mid);letter-spacing:.04em}
.detail-body{padding:1.4rem 1.5rem;max-width:600px}

/* cycle card */
.cycle-card{background:var(--surface);border:1px solid var(--rule);border-radius:14px;padding:1.1rem 1.2rem;margin-bottom:1.2rem}
.cycle-card.warn{border-color:var(--warn);background:var(--warn-light)}
.c-lbl{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mid);margin-bottom:.2rem}
.c-num{font-family:'Instrument Serif',serif;font-size:2.4rem;line-height:1}
.c-num small{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--mid)}
.c-warn{font-size:.75rem;color:var(--warn);font-weight:500;margin-top:.3rem}
.cycle-dots{display:flex;gap:6px;margin:1rem 0;flex-wrap:wrap}
.cdot{width:12px;height:12px;border-radius:50%}
.cdot.done{background:var(--dot-done)}
.cdot.next{background:var(--dot-next)}
.cdot.empty{background:var(--dot-empty)}

/* next box */
.next-box{background:var(--bg);border-radius:10px;padding:.8rem 1rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.nb-lbl{font-size:.57rem;text-transform:uppercase;letter-spacing:.1em;color:var(--mid);margin-bottom:3px}
.nb-date{font-size:.9rem;font-weight:500}
.nb-date.today{color:var(--green)}
.nb-time{font-size:.68rem;color:var(--mid);margin-top:1px}
.btn-change{border:1px solid var(--rule);border-radius:7px;padding:6px 12px;font-family:'DM Mono',monospace;font-size:.65rem;cursor:pointer;color:var(--mid);background:none;transition:all .15s}
.btn-change:hover{border-color:var(--ink);color:var(--ink)}

/* action */
.action-wrap{margin-top:.3rem}
.btn-mark-done{width:100%;padding:16px;border-radius:10px;background:var(--green);color:#fff;border:none;font-family:'DM Mono',monospace;font-size:.82rem;letter-spacing:.05em;cursor:pointer;transition:opacity .15s}
.btn-mark-done:hover{opacity:.85}
.btn-new-cycle{width:100%;padding:14px;border-radius:10px;background:var(--ink);color:#fff;border:none;font-family:'DM Mono',monospace;font-size:.82rem;cursor:pointer;transition:opacity .15s}

/* history */
.hist-section{margin-top:1.5rem}
.hist-item{display:flex;align-items:center;gap:.9rem;padding:.75rem 0;border-bottom:1px solid var(--rule)}
.hist-item:last-child{border-bottom:none}
.h-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.h-dot.completed{background:var(--dot-done)}
.h-dot.skipped{background:var(--dot-empty)}
.h-left{flex:1}
.h-date{font-size:.76rem;font-weight:500}
.h-note{font-size:.63rem;color:var(--mid);margin-top:1px}
.h-badge{font-size:.58rem;padding:2px 7px;border-radius:20px;letter-spacing:.04em}
.h-badge.done{background:var(--green-light);color:var(--green)}
.h-badge.skipped{background:var(--rule);color:var(--mid)}

/* settings */
.settings-section{margin-top:1.5rem;padding-top:1.2rem;border-top:1px solid var(--rule)}
.s-row{display:flex;justify-content:space-between;align-items:center;padding:.65rem 0;border-bottom:1px solid var(--rule)}
.s-row:last-child{border-bottom:none}
.s-row-lbl{font-size:.68rem;color:var(--mid)}
.s-row-val{font-size:.76rem;font-weight:500}

/* modals */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:16px;padding:1.7rem;width:380px;max-width:94vw;max-height:90vh;overflow-y:auto;transform:translateY(10px);transition:transform .2s;box-shadow:0 20px 60px rgba(0,0,0,.14)}
.overlay.open .modal{transform:translateY(0)}
.m-title{font-family:'Instrument Serif',serif;font-size:1.2rem;margin-bottom:1.2rem}
.field{margin-bottom:.85rem}
.field label{display:block;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mid);margin-bottom:5px}
.field input,.field select{width:100%;padding:9px 11px;border:1px solid var(--rule);border-radius:8px;font-family:'DM Mono',monospace;font-size:.82rem;background:var(--bg);color:var(--ink);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--ink);background:#fff}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.m-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1.2rem}
.btn-cancel{padding:8px 15px;border:1px solid var(--rule);border-radius:7px;background:#fff;font-family:'DM Mono',monospace;font-size:.7rem;cursor:pointer;color:var(--mid)}
.btn-save{padding:8px 17px;border:none;border-radius:7px;background:var(--ink);color:#fff;font-family:'DM Mono',monospace;font-size:.7rem;cursor:pointer}
.btn-save:hover{opacity:.8}
.m-summary{background:var(--green-light);border-radius:9px;padding:.85rem 1rem;margin-bottom:1rem;font-size:.75rem;color:var(--green);line-height:1.6}
.m-warn{background:var(--warn-light);border:1px solid var(--warn);border-radius:9px;padding:.8rem 1rem;margin-bottom:1rem;font-size:.76rem;color:var(--warn);line-height:1.6}

/* toast */
.toast{position:fixed;bottom:1.8rem;left:50%;transform:translateX(-50%) translateY(14px);background:var(--ink);color:#fff;padding:9px 18px;border-radius:8px;font-size:.7rem;opacity:0;transition:all .26s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:560px){
  header,main,.detail-hdr,.detail-body{padding-left:1rem;padding-right:1rem}
  .f-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- HOME -->
<div class="page active" id="pageHome">
  <header>
    <div class="logo">Lesson<em>Log</em></div>
    <div style="display:flex;align-items:center;gap:.8rem">
      <span class="date-lbl" id="headerDate"></span>
      <button class="btn btn-dark" id="btnAddStudent">+ Student</button>
    </div>
  </header>
  <main>
    <div id="todayStrip"></div>
    <div class="lbl">All Students</div>
    <div class="students-list" id="studentsList"></div>
    <div class="empty-state" id="emptyState" style="display:none">
      <p>No students yet.<br>Add your first to get started.</p>
      <button class="btn btn-dark" id="btnAddStudentEmpty">+ Add Student</button>
    </div>
  </main>
</div>

<!-- DETAIL -->
<div class="page" id="pageDetail">
  <header>
    <button class="btn btn-ghost" id="btnBack">← All Students</button>
    <button class="btn btn-dark" id="btnHeaderMarkDone">✓ Mark Done</button>
  </header>
  <div class="detail-hdr">
    <div>
      <div class="d-name" id="detailName"></div>
      <div class="d-sub" id="detailSub"></div>
    </div>
    <button class="btn-link" id="btnEditStudent">Edit student</button>
  </div>
  <div class="detail-body">
    <div class="cycle-card" id="cycleCard">
      <div class="c-lbl" id="cycleLabel">This Cycle</div>
      <div class="c-num" id="cycleCount"></div>
      <div class="c-warn" id="cycleWarn" style="display:none"></div>
      <div class="cycle-dots" id="cycleDots"></div>
      <div class="next-box">
        <div>
          <div class="nb-lbl">Next Lesson</div>
          <div class="nb-date" id="nbDate"></div>
          <div class="nb-time" id="nbTime"></div>
        </div>
        <button class="btn-change" id="btnChange">Change</button>
      </div>
      <div class="action-wrap" id="actionWrap"></div>
    </div>
    <div class="hist-section">
      <div class="lbl">Lesson History</div>
      <div id="histList"></div>
    </div>
    <div class="settings-section">
      <div class="lbl">Student Details</div>
      <div id="settingsRows"></div>
      <div style="margin-top:1rem;text-align:right">
        <button class="btn-link-warn" id="btnDeleteStudent">Remove student</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Add Student -->
<div class="overlay" id="ovAddStudent">
  <div class="modal">
    <div class="m-title">New Student</div>
    <div class="field"><label>Name</label><input type="text" id="sName" placeholder="e.g. James"></div>
    <div class="f-row">
      <div class="field"><label>Lessons per package</label>
        <select id="sPackage">
          <option value="4">4 lessons</option><option value="6">6 lessons</option>
          <option value="8">8 lessons</option><option value="10">10 lessons</option><option value="12">12 lessons</option>
        </select>
      </div>
      <div class="field"><label>Rate per lesson ($)</label><input type="number" id="sRate" placeholder="50" min="0"></div>
    </div>
    <div class="f-row">
      <div class="field"><label>Next lesson date</label><input type="date" id="sDate"></div>
      <div class="field"><label>Time</label><input type="time" id="sTime" value="15:00"></div>
    </div>
    <div class="m-actions">
      <button class="btn-cancel" id="btnCancelAdd">Cancel</button>
      <button class="btn-save" id="btnSaveAdd">Add Student</button>
    </div>
  </div>
</div>

<!-- MODAL: Edit Student -->
<div class="overlay" id="ovEditStudent">
  <div class="modal">
    <div class="m-title">Edit Student</div>
    <div class="field"><label>Name</label><input type="text" id="eName"></div>
    <div class="f-row">
      <div class="field"><label>Lessons per package</label>
        <select id="ePackage">
          <option value="4">4 lessons</option><option value="6">6 lessons</option>
          <option value="8">8 lessons</option><option value="10">10 lessons</option><option value="12">12 lessons</option>
        </select>
      </div>
      <div class="field"><label>Rate per lesson ($)</label><input type="number" id="eRate" min="0"></div>
    </div>
    <div class="m-actions">
      <button class="btn-cancel" id="btnCancelEdit">Cancel</button>
      <button class="btn-save" id="btnSaveEdit">Save</button>
    </div>
  </div>
</div>

<!-- MODAL: Mark Done -->
<div class="overlay" id="ovDone">
  <div class="modal">
    <div class="m-title">Lesson Complete ✓</div>
    <div class="m-summary" id="doneSummary"></div>
    <div class="m-warn" id="doneCycleBanner" style="display:none"></div>
    <div class="f-row">
      <div class="field"><label>Next lesson date</label><input type="date" id="dDate"></div>
      <div class="field"><label>Time</label><input type="time" id="dTime"></div>
    </div>
    <div class="m-actions">
      <button class="btn-cancel" id="btnSkipDone">Skip for now</button>
      <button class="btn-save" id="btnConfirmDone">Save</button>
    </div>
  </div>
</div>

<!-- MODAL: Schedule Next -->
<div class="overlay" id="ovSchedule">
  <div class="modal">
    <div class="m-title">Next Lesson</div>
    <div class="f-row">
      <div class="field"><label>Date</label><input type="date" id="schDate"></div>
      <div class="field"><label>Time</label><input type="time" id="schTime"></div>
    </div>
    <div class="m-actions">
      <button class="btn-cancel" id="btnCancelSchedule">Cancel</button>
      <button class="btn-save" id="btnConfirmSchedule">Confirm</button>
    </div>
  </div>
</div>

<!-- MODAL: Edit Lesson -->
<div class="overlay" id="ovEditLesson">
  <div class="modal">
    <div class="m-title">Edit Lesson</div>
    <div class="f-row">
      <div class="field"><label>Date</label><input type="date" id="elDate"></div>
      <div class="field"><label>Time</label><input type="time" id="elTime"></div>
    </div>
    <div class="field"><label>Status</label>
      <select id="elStatus">
        <option value="completed">Completed</option>
        <option value="skipped">Skipped / Cancelled</option>
      </select>
    </div>
    <div class="field"><label>Note (optional)</label><input type="text" id="elNote" placeholder="e.g. student was sick"></div>
    <div class="m-actions">
      <button class="btn-cancel" id="btnCancelEditLesson">Cancel</button>
      <button class="btn-save" id="btnConfirmEditLesson">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──
let db = JSON.parse(localStorage.getItem('ll_v3') || '[]');
let activeId = null;
let editIdx = null;

function persist() { localStorage.setItem('ll_v3', JSON.stringify(db)); }
function get(id) { return db.find(s => s.id === id); }
function active() { return get(activeId); }

// ── DATES ──
function todayStr() { return new Date().toISOString().split('T')[0]; }
const _now = new Date();

function nextWeek(ds) {
  if (!ds) return '';
  const d = new Date(ds + 'T12:00:00');
  d.setDate(d.getDate() + 7);
  return d.toISOString().split('T')[0];
}

function fmtDate(ds) {
  if (!ds) return 'Not scheduled';
  const d = new Date(ds + 'T12:00:00');
  const t = todayStr();
  const tom = new Date(_now); tom.setDate(tom.getDate() + 1);
  if (ds === t) return 'Today';
  if (ds === tom.toISOString().split('T')[0]) return 'Tomorrow';
  const diff = Math.round((d - _now) / 86400000);
  if (diff > 0 && diff <= 6) return d.toLocaleDateString('en-US', {weekday:'long'});
  return d.toLocaleDateString('en-US', {weekday:'short', day:'numeric', month:'short'});
}

function fmtFull(ds) {
  if (!ds) return '—';
  return new Date(ds + 'T12:00:00').toLocaleDateString('en-US', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
}

function isToday(ds) { return ds === todayStr(); }
function isSoon(ds) {
  if (!ds) return false;
  return Math.round((new Date(ds + 'T12:00:00') - _now) / 86400000) <= 2;
}

// ── CYCLE HELPERS ──
function totalDone(s) { return s.history.filter(h => h.status === 'completed').length; }
function doneInCycle(s) { return totalDone(s) % s.package; }
function cycleNum(s) { return Math.floor(totalDone(s) / s.package) + 1; }

// ── MODALS ──
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── TOAST ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── HOME ──
function renderHome() {
  document.getElementById('headerDate').textContent =
    _now.toLocaleDateString('en-US', {weekday:'long', day:'numeric', month:'long'});

  // Today strip
  const todayStudents = db.filter(s => s.nextDate === todayStr());
  const strip = document.getElementById('todayStrip');
  if (todayStudents.length) {
    strip.innerHTML = todayStudents.map(s =>
      `<div class="today-strip" style="margin-bottom:.6rem">
        <div>
          <div class="today-name">${s.name}</div>
          <div class="today-meta">Today${s.nextTime ? ' · ' + s.nextTime.slice(0,5) : ''} · Lesson ${doneInCycle(s)+1} of ${s.package}</div>
        </div>
        <button class="btn-done" data-sid="${s.id}">✓ Mark Done</button>
      </div>`
    ).join('');
    // Attach Mark Done buttons in today strip
    strip.querySelectorAll('.btn-done').forEach(btn => {
      btn.addEventListener('click', () => {
        activeId = btn.dataset.sid;
        goDetail(activeId);
      });
    });
  } else {
    strip.innerHTML = `<div class="today-strip empty" style="margin-bottom:1.4rem"><span style="font-size:.66rem;letter-spacing:.05em">No lessons today</span></div>`;
  }

  // Students list
  const list = document.getElementById('studentsList');
  const empty = document.getElementById('emptyState');

  if (!db.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  const sorted = [...db].sort((a, b) => {
    if (a.nextDate && b.nextDate) return a.nextDate.localeCompare(b.nextDate);
    if (a.nextDate) return -1;
    if (b.nextDate) return 1;
    return 0;
  });

  list.innerHTML = '';
  sorted.forEach(s => {
    const done = doneInCycle(s);
    const rem = s.package - done;
    const isLast = rem <= 1 && done > 0;
    const ndCls = isToday(s.nextDate) ? 'today' : isSoon(s.nextDate) ? 'soon' : '';

    const dotsHTML = Array.from({length: s.package}, (_, i) =>
      `<div class="dot ${i < done ? 'done' : i === done && s.nextDate ? 'next' : 'empty'}"></div>`
    ).join('');

    const div = document.createElement('div');
    div.className = 's-card' + (isLast ? ' warn' : '');
    div.innerHTML = `
      <div class="s-card-left">
        <div class="s-name">${s.name}</div>
        <div class="dots">${dotsHTML}</div>
        ${isLast
          ? `<span class="s-sub warn-txt">Last lesson — collect payment</span>`
          : `<span class="s-sub">${rem} left · $${(rem * s.rate).toLocaleString()}</span>`}
      </div>
      <div class="s-card-right">
        <div class="nl-lbl">Next Lesson</div>
        <div class="nl-date ${ndCls}">${fmtDate(s.nextDate)}</div>
        ${s.nextTime ? `<div class="nl-time">${s.nextTime.slice(0,5)}</div>` : ''}
      </div>
      <div class="chevron">›</div>`;
    div.addEventListener('click', () => goDetail(s.id));
    list.appendChild(div);
  });
}

// ── DETAIL ──
function renderDetail() {
  const s = active(); if (!s) return;
  const done = doneInCycle(s);
  const rem = s.package - done;
  const isLast = rem <= 1 && done > 0;
  const cn = cycleNum(s);

  document.getElementById('detailName').textContent = s.name;
  document.getElementById('detailSub').textContent = `Cycle ${cn} · $${s.rate}/lesson · ${s.package}-lesson package`;

  document.getElementById('cycleCard').className = 'cycle-card' + (isLast ? ' warn' : '');
  document.getElementById('cycleLabel').textContent = `Lesson ${done + 1} of ${s.package}`;
  document.getElementById('cycleCount').innerHTML = `${done + 1}<small> / ${s.package}</small>`;

  const warn = document.getElementById('cycleWarn');
  if (isLast) { warn.style.display = 'block'; warn.textContent = `Last lesson — collect $${(s.package * s.rate).toLocaleString()}`; }
  else warn.style.display = 'none';

  document.getElementById('cycleDots').innerHTML = Array.from({length: s.package}, (_, i) =>
    `<div class="cdot ${i < done ? 'done' : i === done ? 'next' : 'empty'}"></div>`
  ).join('');

  const nbDate = document.getElementById('nbDate');
  nbDate.textContent = fmtDate(s.nextDate);
  nbDate.className = 'nb-date' + (isToday(s.nextDate) ? ' today' : '');
  document.getElementById('nbTime').textContent = s.nextTime ? s.nextTime.slice(0,5) : '';

  const wrap = document.getElementById('actionWrap');
  wrap.innerHTML = '';
  if (done >= s.package) {
    const btn = document.createElement('button');
    btn.className = 'btn-new-cycle';
    btn.textContent = '🎉 Start New Cycle';
    btn.addEventListener('click', newCycle);
    wrap.appendChild(btn);
  } else {
    const btn = document.createElement('button');
    btn.className = 'btn-mark-done';
    btn.textContent = '✓ Mark Done';
    btn.addEventListener('click', openDoneModal);
    wrap.appendChild(btn);
  }

  // History
  const hist = document.getElementById('histList');
  if (!s.history.length) {
    hist.innerHTML = '<div style="font-size:.7rem;color:var(--faint);padding:.6rem 0">No lessons recorded yet.</div>';
  } else {
    hist.innerHTML = '';
    [...s.history].reverse().forEach((h, ri) => {
      const origIdx = s.history.length - 1 - ri;
      const div = document.createElement('div');
      div.className = 'hist-item';
      div.innerHTML = `
        <div class="h-dot ${h.status}"></div>
        <div class="h-left">
          <div class="h-date">${fmtFull(h.date)}${h.time ? ' · ' + h.time.slice(0,5) : ''}</div>
          ${h.note ? `<div class="h-note">${h.note}</div>` : ''}
        </div>
        <span class="h-badge ${h.status === 'completed' ? 'done' : 'skipped'}">${h.status === 'completed' ? 'Done' : 'Skipped'}</span>`;
      const editBtn = document.createElement('button');
      editBtn.className = 'btn-link';
      editBtn.style.marginLeft = '.5rem';
      editBtn.textContent = 'Edit';
      editBtn.addEventListener('click', () => openEditLesson(origIdx));
      div.appendChild(editBtn);
      hist.appendChild(div);
    });
  }

  // Settings
  document.getElementById('settingsRows').innerHTML = `
    <div class="s-row"><span class="s-row-lbl">Package size</span><span class="s-row-val">${s.package} lessons</span></div>
    <div class="s-row"><span class="s-row-lbl">Rate per lesson</span><span class="s-row-val">$${s.rate}</span></div>
    <div class="s-row"><span class="s-row-lbl">Total lessons done</span><span class="s-row-val">${totalDone(s)}</span></div>
    <div class="s-row"><span class="s-row-lbl">Cycles completed</span><span class="s-row-val">${cn - 1}</span></div>`;
}

// ── NAV ──
function goHome() {
  document.getElementById('pageDetail').classList.remove('active');
  document.getElementById('pageHome').classList.add('active');
  activeId = null;
  renderHome();
}

function goDetail(id) {
  activeId = id;
  document.getElementById('pageHome').classList.remove('active');
  document.getElementById('pageDetail').classList.add('active');
  renderDetail();
}

// ── ADD STUDENT ──
document.getElementById('btnAddStudent').addEventListener('click', () => openModal('ovAddStudent'));
document.getElementById('btnAddStudentEmpty').addEventListener('click', () => openModal('ovAddStudent'));
document.getElementById('btnCancelAdd').addEventListener('click', () => closeModal('ovAddStudent'));
document.getElementById('btnSaveAdd').addEventListener('click', () => {
  const name = document.getElementById('sName').value.trim();
  if (!name) { toast('Enter a student name'); return; }
  const s = {
    id: Date.now().toString(), name,
    package: parseInt(document.getElementById('sPackage').value),
    rate: parseFloat(document.getElementById('sRate').value) || 0,
    nextDate: document.getElementById('sDate').value || null,
    nextTime: document.getElementById('sTime').value || null,
    history: [],
  };
  db.push(s);
  persist();
  document.getElementById('sName').value = '';
  closeModal('ovAddStudent');
  renderHome();
  toast(`${name} added`);
});

// ── EDIT STUDENT ──
document.getElementById('btnEditStudent').addEventListener('click', () => {
  const s = active(); if (!s) return;
  document.getElementById('eName').value = s.name;
  document.getElementById('ePackage').value = s.package;
  document.getElementById('eRate').value = s.rate;
  openModal('ovEditStudent');
});
document.getElementById('btnCancelEdit').addEventListener('click', () => closeModal('ovEditStudent'));
document.getElementById('btnSaveEdit').addEventListener('click', () => {
  const s = active(); if (!s) return;
  s.name = document.getElementById('eName').value.trim() || s.name;
  s.package = parseInt(document.getElementById('ePackage').value);
  s.rate = parseFloat(document.getElementById('eRate').value) || 0;
  persist(); closeModal('ovEditStudent'); renderDetail(); renderHome();
  toast('Saved');
});

// ── DELETE STUDENT ──
document.getElementById('btnDeleteStudent').addEventListener('click', () => {
  const s = active(); if (!s) return;
  if (!confirm(`Remove ${s.name}? All history will be lost.`)) return;
  db = db.filter(x => x.id !== activeId);
  persist(); goHome(); toast('Student removed');
});

// ── MARK DONE ──
document.getElementById('btnHeaderMarkDone').addEventListener('click', openDoneModal);

function openDoneModal() {
  const s = active(); if (!s) return;
  const done = doneInCycle(s);
  const after = done + 1;
  const cycleEnd = after >= s.package;
  document.getElementById('doneSummary').innerHTML =
    `<strong>${s.name}</strong> — Lesson ${after} of ${s.package} complete.` +
    (cycleEnd ? '' : `<br>${s.package - after} lesson${s.package - after !== 1 ? 's' : ''} remaining.`);
  const banner = document.getElementById('doneCycleBanner');
  if (cycleEnd) { banner.style.display = 'block'; banner.textContent = `🎉 Cycle complete — collect $${(s.package * s.rate).toLocaleString()} from ${s.name}`; }
  else banner.style.display = 'none';
  document.getElementById('dDate').value = nextWeek(s.nextDate);
  document.getElementById('dTime').value = s.nextTime || '15:00';
  openModal('ovDone');
}

document.getElementById('btnSkipDone').addEventListener('click', () => closeModal('ovDone'));
document.getElementById('btnConfirmDone').addEventListener('click', () => {
  const s = active(); if (!s) return;
  s.history.push({date: s.nextDate || todayStr(), time: s.nextTime || null, status: 'completed', note: ''});
  s.nextDate = document.getElementById('dDate').value || null;
  s.nextTime = document.getElementById('dTime').value || null;
  persist(); closeModal('ovDone'); renderDetail(); renderHome();
  toast('✓ Lesson marked done');
});

// ── SCHEDULE NEXT ──
document.getElementById('btnChange').addEventListener('click', () => {
  const s = active(); if (!s) return;
  document.getElementById('schDate').value = s.nextDate || '';
  document.getElementById('schTime').value = s.nextTime || '15:00';
  openModal('ovSchedule');
});
document.getElementById('btnCancelSchedule').addEventListener('click', () => closeModal('ovSchedule'));
document.getElementById('btnConfirmSchedule').addEventListener('click', () => {
  const s = active(); if (!s) return;
  s.nextDate = document.getElementById('schDate').value || null;
  s.nextTime = document.getElementById('schTime').value || null;
  persist(); closeModal('ovSchedule'); renderDetail(); renderHome();
  toast('Next lesson updated');
});

// ── EDIT LESSON ──
function openEditLesson(idx) {
  editIdx = idx;
  const s = active(); if (!s) return;
  const h = s.history[idx];
  document.getElementById('elDate').value = h.date || '';
  document.getElementById('elTime').value = h.time || '';
  document.getElementById('elStatus').value = h.status;
  document.getElementById('elNote').value = h.note || '';
  openModal('ovEditLesson');
}
document.getElementById('btnCancelEditLesson').addEventListener('click', () => closeModal('ovEditLesson'));
document.getElementById('btnConfirmEditLesson').addEventListener('click', () => {
  const s = active(); if (!s) return;
  const h = s.history[editIdx];
  h.date = document.getElementById('elDate').value || h.date;
  h.time = document.getElementById('elTime').value || null;
  h.status = document.getElementById('elStatus').value;
  h.note = document.getElementById('elNote').value.trim();
  persist(); closeModal('ovEditLesson'); renderDetail();
  toast('Lesson updated');
});

// ── NEW CYCLE ──
function newCycle() {
  const s = active(); if (!s) return;
  if (!confirm(`Start a new ${s.package}-lesson cycle for ${s.name}?`)) return;
  s.nextDate = null; s.nextTime = null;
  persist(); renderDetail(); toast('New cycle started');
}

// ── BACK ──
document.getElementById('btnBack').addEventListener('click', goHome);

// ── OVERLAY CLOSE ON BACKDROP ──
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ── PWA ──
(function() {
  const canvas = document.createElement('canvas');
  canvas.width = 180; canvas.height = 180;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1A1A1A';
  if (ctx.roundRect) { ctx.roundRect(0,0,180,180,32); ctx.fill(); }
  else { ctx.fillRect(0,0,180,180); }
  ctx.fillStyle = '#F7F5F0';
  ctx.font = 'italic bold 60px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('LL', 90, 88);
  ctx.fillStyle = '#2D5A3D';
  ctx.beginPath(); ctx.arc(128, 52, 12, 0, Math.PI*2); ctx.fill();
  const icon = canvas.toDataURL('image/png');
  document.getElementById('appleTouchIcon').href = icon;
  const mf = {name:'LessonLog',short_name:'LessonLog',start_url:'./',display:'standalone',background_color:'#F7F5F0',theme_color:'#1A1A1A',icons:[{src:icon,sizes:'180x180',type:'image/png'}]};
  document.getElementById('manifestLink').href = URL.createObjectURL(new Blob([JSON.stringify(mf)], {type:'application/json'}));
  if ('serviceWorker' in navigator) {
    const sw = `const C='ll-v3';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.add('/'))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
  }
})();

// ── INIT ──
renderHome();
</script>
</body>
</html>
